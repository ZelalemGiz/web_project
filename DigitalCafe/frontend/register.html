<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register • Kebede Yimer Digital Café</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Navbar (same as index) -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">☕ Kebede Yimer</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu">Menu</a></li>
                <li><a href="index.html#roasting">Roasting</a></li>
            </ul>
            <div class="nav-actions">
                <button onclick="location.href='login.html'" class="login-btn">Login</button>
                <button onclick="toggleMobileMenu()" class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
        <ul id="mobile-menu" class="mobile-menu">
            <li><a href="index.html" onclick="toggleMobileMenu()">Home</a></li>
            <li><a href="index.html#menu" onclick="toggleMobileMenu()">Menu</a></li>
            <li><a href="index.html#roasting" onclick="toggleMobileMenu()">Roasting</a></li>
        </ul>
    </nav>

    <!-- Register Form -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-box">
                <h2><i class="fas fa-user-plus"></i> Create Account</h2>
                <p>Join Kebede Yimer and get fresh coffee delivered fast</p>

                <form id="register-form" onsubmit="Backend/register.php">
                    <div id="register-error" class="form-error" aria-live="polite"></div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Zelalem Kebede" required>
                    </div>
                    
                   <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="Add city or neighborhood" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="you@email.com" required>
                    </div>

                    
                    <div class="form-group">
                        <label>Phone No.</label>
                        <input type="tel" id="phone" placeholder="09XXXXXXXXX" pattern="\d{7,15}" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" placeholder="••••••••" required>
                    </div>

                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="auth-btn">Register Now</button>
                </form>

                <p class="auth-switch">
                    Already have an account? 
                    <a href="login.html">Login here</a>
                </p>
            </div>
        </div>
    </section>

    <script>

        function showRegisterError(message) {
            const errorBox = document.getElementById('register-error');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
        }

        function clearRegisterError() {
            const errorBox = document.getElementById('register-error');
            errorBox.textContent = '';
            errorBox.style.display = 'none';
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function isValidPhone(phone) {
            return /^\d{7,15}$/.test(phone);
        }

        function isStrongPassword(pass) {
            return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/.test(pass);
        }

        async function handleRegister(e) {
            e.preventDefault();
            clearRegisterError();

            const name = document.getElementById('name').value.trim();
            const location = document.getElementById('location').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm-password').value;

            if (!name || name.length < 3) {
                showRegisterError('Please enter your full name (at least 3 characters).');
                document.getElementById('name').focus();
                return;
            }

            if (!location || location.length < 2) {
                showRegisterError('Please enter your location.');
                document.getElementById('location').focus();
                return;
            }

            if (!isValidEmail(email)) {
                showRegisterError('Please enter a valid email address.');
                document.getElementById('email').focus();
                return;
            }

            if (!isValidPhone(phone)) {
                showRegisterError('Please enter a valid phone number using 7 to 15 digits.');
                document.getElementById('phone').focus();
                return;
            }

            if (!isStrongPassword(pass)) {
                showRegisterError('Password must be at least 8 characters and include uppercase, lowercase, and a number.');
                document.getElementById('password').focus();
                return;
            }

            if (pass !== confirm) {
                showRegisterError('Passwords do not match. Please confirm your password.');
                document.getElementById('confirm-password').focus();
                return;
            }

            try {
                const response = await postJson('/api/register', {
                    name,
                    location,
                    email,
                    phone,
                    password: pass,
                    confirmPassword: confirm
                });
                const result = await response.json();

                if (!response.ok) {
                    showRegisterError(result.message || 'Unable to register.');
                    return;
                }

                alert(`🎉 Registration Successful!\n\nWelcome, ${name}!\nYou can now login with ${email}`);
                e.target.reset();

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 800);
            } catch (error) {
                showRegisterError('Unable to connect to the server. Please try again later.');
            }
        }

        // Mobile menu (reuse from main)
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
