<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Kebede Yimer Digital Café</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- Navbar (same as index) -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">☕ Kebede Yimer</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#menu">Menu</a></li>
                <li><a href="index.html#roasting">Roasting</a></li>
            </ul>
            <div class="nav-actions">
                <button onclick="location.href='register.html'" class="register-btn">Register</button>
                <button onclick="toggleMobileMenu()" class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
        <ul id="mobile-menu" class="mobile-menu">
            <li><a href="index.html" onclick="toggleMobileMenu()">Home</a></li>
            <li><a href="index.html#menu" onclick="toggleMobileMenu()">Menu</a></li>
            <li><a href="index.html#roasting" onclick="toggleMobileMenu()">Roasting</a></li>
        </ul>
    </nav>

    <!-- Login Form -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-box">
                <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
                <p>Sign in to order your favorite coffee</p>

                <form id="login-form" onsubmit="handleLogin(event)">
                    <div id="login-error" class="form-error" aria-live="polite"></div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="login-email" placeholder="you@email.com" required>
                    </div>

                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="login-password" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="auth-btn">Login</button>
                </form>

                <p class="auth-switch">
                    Don't have an account? 
                    <a href="register.html">Register here</a>
                </p>
            </div>
        </div>
    </section>

    <script>
        

        function showLoginError(message) {
            const errorBox = document.getElementById('login-error');
            errorBox.textContent = message;
            errorBox.style.display = 'block';
        }

        function clearLoginError() {
            const errorBox = document.getElementById('login-error');
            errorBox.textContent = '';
            errorBox.style.display = 'none';
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        async function handleLogin(e) {
            e.preventDefault();
            clearLoginError();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;

            if (!isValidEmail(email)) {
                showLoginError('Please enter a valid email address.');
                document.getElementById('login-email').focus();
                return;
            }

            if (!password || password.length < 8) {
                showLoginError('Please enter a password with at least 8 characters.');
                document.getElementById('login-password').focus();
                return;
            }

            try {
                const response = await postJson('/api/login', { email, password });
                const result = await response.json();

                if (!response.ok) {
                    showLoginError(result.message || 'Unable to login.');
                    return;
                }

                localStorage.setItem('loggedInUser', email);
                alert(`✅ Login Successful!\n\nWelcome back!\nYou are now logged in as ${email}`);
                e.target.reset();

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
            } catch (error) {
                showLoginError('Unable to connect to the server. Please try again later.');
            }
        }

        // Mobile menu
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.style.display = menu.style.display === 'flex' ? 'none' : 'flex';
        }
    </script>
</body>
</html>
